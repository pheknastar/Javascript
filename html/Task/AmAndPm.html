<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        let time = Number(prompt("Enter Time"));
        if (time <= 12) {
            console.log("Goog Morning");
        }
        else if (time <= 16) {
            console.log("Goog Afternoon");
        }
        else if (time <= 20) {
            console.log("Goog Evening");
        }
        else {
            console.log("Goog Night");
        }
    </script>
</body>

</html>
