<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        let char = prompt("Give any character");
        switch (char) {
            case 'a':
            case 'e':
            case 'i':
            case 'o':
            case 'u':
                console.log(`${char} is vowel`);
                break;
        
            default:
                console.log(`${char} is consonant`);
                break;
        }
    </script>
</body>
</html>
