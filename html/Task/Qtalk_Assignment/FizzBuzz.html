<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        // Write a program to print 1-50 ==> %3 - "fizz" , %5 - "buzz" , both 3&5 "fizzbuzz" , stop loop num > 20
        let num = 50;
        for (let i = 1; i <= num; i++) {
            if (i > 20) {
                break;
            }
            if (i % 3 == 0 && i % 5 == 0) {
                console.log(`${i} is FizzBuzz`);
            } else if (i % 5 == 0) {
                console.log(`${i} is Buzz`);
            } else if (i % 3 == 0) {
                console.log(`${i} is Fizz`);
            }
        }
    </script>
</body>

</html>
