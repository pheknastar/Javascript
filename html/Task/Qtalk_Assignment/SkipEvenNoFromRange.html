<body>
    <script>
        //  Write a program to print 1-10 ==> skip even num , break at num > 5
        let num = 15;
        for (let i = 1; i <= num; i++) {
            if (i % 2 == 0) {
                continue;
            }
            if(i > 10){
                break;
            }
            console.log(i);
        }
    </script>
</body>
