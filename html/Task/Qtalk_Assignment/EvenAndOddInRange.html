<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        // Write a program to print count of even and odd numbers in a given range
        let s = 1;
        let e = 11;
        let ecount = 0;
        let ocount = 0;
        for (let i = s; i <= e; i++) {
            if (i % 2 == 0) {
                ecount++;
            } else {
                ocount++;
            }
        }
        console.log(`${ecount} even no`);
        console.log(`${ocount} odd no`);

    </script>
</body>

</html>
