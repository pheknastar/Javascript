<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        let color = prompt("Enter Color");
        if(color == "Red"){
            console.log("Stop");
        }
        else if(color == "Yellow"){
            console.log("Get Ready");
        }
        else if(color == "Green"){
            console.log("Start");
        }
        else{
            console.log("Wait");
        }
    </script>
</body>
</html>
