<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        /* id selector */
        #heading{
            background-color: chocolate;
        }
        /* element selector */
        h1{
            background-color: aqua;
        }
        /* universal or full-background selector */
        *{
            background-color: darkcyan;
        }
    </style>
</head>
<body>
    <h1 id="heading">Web Technology</h1>
    <h1>CSS</h1>
    <h1>HTML</h1>
</body>
</html>
