<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend align = "center">Login Form</legend>
            <label>Username : </label>
            <input type="text" placeholder="enter username"> <br> <br>

            <label>Password : </label>
            <input type="password" placeholder="password"> <br> <br>

            <label>Email : </label>
            <input type="email" placeholder="enter email"> <br> <br>

            <label>Phone Number : </label>
            <input type="tel" pattern="[0-9]{10}" placeholder="enter phoneNo"> <br> <br>

            <label>Upload Resume : </label>
            <input type="file"> <br> <br>

            <label>Select Range : </label>
            <input type="range"> <br> <br>

            <label>Gender : </label>
            <input type="radio" name="gender" value="male">
            <label>male</label>
            <input type="radio" name="gender" value="female">
            <label>female</label>
            <input type="radio" name="gender" value="others">
            <label>others</label> <br><br>

            <label>Programming Language : </label>
            <input type="checkbox" name="pl" value="html">
            <label>html</label>
            <input type="checkbox" name="pl" value="java">
            <label>java</label>
            <input type="checkbox" name="pl" value="python">
            <label>python</label>
            <input type="checkbox" name="pl" value="javascript">
            <label>javascript</label>
            <br><br>

            <label>Select State : </label>
            <select name="State">
                <option disabled selected>select state</option>
                <option value="Jharkhand">Jharkhand</option>
                <option value="Bihar">Bihar</option>
                <option value="Odisha">Odisha</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Delhi">Delhi</option>
            </select>
            <br><br>

            <label>Address : </label>
            <textarea name="" rows="6" cols="12"></textarea>
            <br><br>

            <input type="submit" value="SignUp">
        </fieldset>
    </form>
</body>
</html>
