<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        let num = 11;
        let prime = true;
        if (num == 1) {
            prime = false;
        } else {
            for (let index = 2; index < num; index++) {
                if (num % index == 0) {
                    prime = false;
                    break;
                }
            }
        }
        if (prime) {
           console.log(`${num} is a prime no.`);
            
        }else{
           console.log(`${num} is not a prime no.`);
        }
        
    </script>
</body>

</html>
