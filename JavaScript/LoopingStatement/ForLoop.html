<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        for (let i = 1; i < 6; i++) {
            console.log(i);
        }

        for (let i = 1; i < 6; i++) {
            console.log("hello" + i);
        }

        let str = "";
        for (let i = 1; i < 6; i++) {
            // str = str + "hello" + "\n";
            str += "hello" + "\n";
        }
        console.log(str);

        for (let i = 100; i < 60; i++) {    //not execute
            console.log(i);
        }

        // for(let i = 100; i>60; i++){    //Infinite loop
        //     console.log(i);
        // }

        for (let i = 100; i > 60; i--) {
            console.log(i);
        }

        for (let i = 0; i <= 5; i++) {
            console.log(i);
        }

        for(;;){    //Infinite loop
            console.log("hello");
        }
    </script>
</body>

</html>
