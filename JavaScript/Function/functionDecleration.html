<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        // Function Decleration

        // non parameterized function
        function main() {
            console.log("Hello");
        }
        main();

        // parameterized function
        function add1(c, d) {
            console.log(c + d);
        }
        add1(); // NaN
        add1(5,4);

        // return Keyword
        function add(a, b) {
            return(a + b);
        }
        console.log(add(5,6));
        
    </script>
</body>

</html>
