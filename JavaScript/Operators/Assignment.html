<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h1>Assingement Operator</h1>
    <script>
        let num = 10;
        num += 20;
        console.log(num);//30
        
        let num1 = 20;
        num1 -= 10;
        console.log(num1);//10

        let num2 = 10;
        num2 *= 20;
        console.log(num2);//200

        let num3 = 7;
        num3 /= 2;
        console.log(num3);3.5

        let num4 = 9;
        num4 %= 2;
        console.log(num4);//1

        let num5 = 7;
        num5 **= 2;
        console.log(num5);//49
    </script>
</body>
</html>
