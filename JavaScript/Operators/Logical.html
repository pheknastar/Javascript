<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <h1>Logical Operator</h1>
    <script>
        // And (&&)
        console.log(4 < 6 && 7 > 5);//true && true = true
        console.log(4 < 6 && 7 < 5);//true && false = false
        console.log(4 > 6 && 7 > 5);//false && true = false
        console.log(4 > 6 && 7 < 5);//false && false = false

        // OR (||)
        console.log(null == 0 || null === 0);//false && false = false
        console.log(null === 0 || null == undefined);//false && true = true
        console.log(true == 1 || false === 0);//true && false = true
        console.log(true == 1 || false == 0);//true && true = true

        // NOT (!)
        console.log(!true);
        console.log(!false);
        console.log(!1);
        console.log(!0);
        console.log(!null);//true
        console.log(!undefined);//true
        
    </script>
</body>

</html>
