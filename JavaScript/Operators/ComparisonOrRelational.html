<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <h1>Comparision and Relational Operator</h1>
    <script>
        console.log(5 < 3);
        console.log(5 > 3);
        console.log(5 < 5);

        console.log(7 > 2);
        console.log(7 < 2);
        console.log(7 > 7);
        console.log(7 < 7);

        console.log(7 <= 7);
        console.log(7 <= 8);

        console.log(true > false);
        console.log(true <= null);
        console.log(false <= undefined);

        //Loosely Equals(==)
        console.log("hello" == "hello");
        console.log("hello" == "Hello");
        console.log("hello" == 5);
        console.log("100" == 100);
        console.log(true == 1);
        console.log(false == 0);
        console.log(false == null);
        console.log(null == undefined);

        //Strictly Equals(===)
        console.log("hello" === "hello");
        console.log(100 === 100);
        console.log("100" === 100);
        console.log(true === 1);
        console.log(false === null);
        console.log(undefined === null);

        // !=
        console.log("hello" != "hello");
        console.log("hello" != "hi");
        console.log("100" != 100);
        console.log(true != 1);
        console.log(false != 0);
        console.log(null != undefined);

        // !==
        console.log("hello" !== "hello");
        console.log("100" !== 100);
        console.log(null !== undefined);
        console.log(false !== 0);

    </script>
</body>

</html>
