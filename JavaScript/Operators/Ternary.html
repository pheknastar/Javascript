<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <h1>Ternary Operator</h1>
    <script>
        // Even
        let num = 20;
        console.log(num % 2 == 0 ? "even" : "odd");

        // Positive and Negative
        let num1 = -21;
        console.log(num1 > 0 ? "positive" : "negative");

        // Largest
        let a = 5;
        let b = 3;
        let c = 9;
        console.log(a > b && a > c ? "a is larget" : b > a && b > c ? "b is largest" : "c is largest");

    </script>
</body>

</html>
