<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <script>
        let num = Number(prompt("give the number"));
        if (num % 2 == 0) {
            console.log(`${num} is even no.`);
        } else {
            console.log(`${num} is odd no.`);
        }
    </script>
</body>

</html>
