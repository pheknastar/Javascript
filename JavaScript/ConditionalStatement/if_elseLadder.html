<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h1>Report Card</h1>
    <script>
        let marks = prompt("Enter your marks");
        if (marks > 100){
            console.log("Marks should not be greater than 100");
        }
        else if(marks >= 90 && marks <= 100){
            console.log("A grade");
        }
        else if(marks >= 80){
            console.log("B grade");
        }
        else if(marks >= 70){
            console.log("C grade");
        }
        else if(marks >= 60){
            console.log("D grade");
        }
        else{
            console.log("Fail");
        }
    </script>
</body>
</html>
