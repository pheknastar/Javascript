<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h1>Variables</h1>
    <script>
        //decleration
        let first_name;
        console.log(first_name);

        //initialization
        first_name = "Chintu";
        console.log(first_name);

        //re-initialization
        first_name = "Bunty";
        console.log(first_name);
        
        // re-decleration 
        // we cant re-declare any variable in let
        
        //single line initialixzation and decleration
        let last_name = "Kumar";
        console.log(last_name);

    </script>
</body>
</html>
